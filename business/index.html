<head>
<meta charset="UTF-8">

<meta property="og:title" content="ОблікБот — Бізнес-бот">

<style>
  body{margin:0;background:#0a0a0f;color:#f0f0f5;font-family:sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
    background:#7c5cfc;animation:p 1.4s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes p{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div>
  <div style="margin-bottom:20px">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
  <p style="color:#888896;font-size:14px">Перенаправлення...</p>
  <noscript>
    <p><a href="https://oblikbot.tech/?page=business" style="color:#7c5cfc">Натисніть тут</a></p>
  </noscript>
</div>
</body>
